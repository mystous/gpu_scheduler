# DCGM-exporter — kind 노드에 캐시된 이미지 사용(imagePullPolicy: Never, 방화벽 무관).
# GPU 리소스를 요청하지 않으므로(nvidia.com/gpu 미요청) 실험 capacity에 영향 없음.
# per-pod GPU 귀속: DCGM_EXPORTER_KUBERNETES=true + kubelet pod-resources 소켓 마운트.
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels: {app: dcgm-exporter}
spec:
  selector:
    matchLabels: {app: dcgm-exporter}
  template:
    metadata:
      labels: {app: dcgm-exporter}
    spec:
      containers:
      - name: dcgm-exporter
        image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.3-4.8.2-distroless
        imagePullPolicy: Never
        args: ["-f", "/etc/dcgm-exporter/dcp-metrics-included.csv"]
        env:
        - name: DCGM_EXPORTER_LISTEN
          value: ":9400"
        - name: DCGM_EXPORTER_KUBERNETES
          value: "true"
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        ports:
        - {name: metrics, containerPort: 9400}
        securityContext:
          privileged: true
        volumeMounts:
        - {name: pod-resources, mountPath: /var/lib/kubelet/pod-resources}
      volumes:
      - name: pod-resources
        hostPath: {path: /var/lib/kubelet/pod-resources}
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: monitoring
spec:
  selector: {app: dcgm-exporter}
  ports:
  - {name: metrics, port: 9400, targetPort: 9400}
